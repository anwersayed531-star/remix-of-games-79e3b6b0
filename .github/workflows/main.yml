name: GameHub Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Remove Capacitor server config for production
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('capacitor.config.json','utf8'));
            delete cfg.server;
            fs.writeFileSync('capacitor.config.json', JSON.stringify(cfg, null, 2));
          "

      - name: Build Web
        run: npm run build

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android Platform
        run: npx cap add android || true

      - name: Register WiFi Direct Plugin
        run: node android-plugins/register-plugin.js

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch minSdkVersion and targetSdkVersion
        run: |
          sed -i 's/minSdkVersion = .*/minSdkVersion = 23/' android/variables.gradle
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 34/' android/variables.gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
